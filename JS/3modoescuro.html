<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modo Escuro</title>
    <style>
    body {
        background-color: white;
        color: black;         
        transition: 0.4s;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;  

    }

    .dark {
        background-color: #121212;
        color: white;
    }
    button{
                padding: 15px 30px;
                border: none;
                border-radius: 12px;
                cursor:pointer;
                transition: transform 0.3s;
                
    }
    button:hover{
        transform:scale(1.05);
    }
    .dark button{
        background-color: white;
        color:#121212;
    }
    body button{
        background-color: black;
        color:white;
    }
    
</style>
</head>
<body>
    <button id="trans">
        Ativar modo escuro
    </button>  
    <script>
        let botao = document.getElementById("trans");
        botao.addEventListener("click", abcde);
        function abcde(){
            document.body.classList.toggle("dark");
            if(document.body.classList.contains("dark")){
                botao.innerText = "Ativar modo claro";
                localStorage.setItem("modo","dark");
                
            } else{
                botao.innerText = "Ativar modo escuro";
                localStorage.setItem("modo", "light");
                
            }
        }
        window.addEventListener("DOMContentLoaded", function(){
            let tema = localStorage.getItem("modo");
            if(tema === "dark"){
                document.body.classList.add("dark");
                botao.innerText = "Ativar modo claro";
            }
            else{
                botao.innerText = "Ativar modo escuro"
                
               
            }
        })
        

    </script>  
</body>
</html>
